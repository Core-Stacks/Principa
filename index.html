<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Principa - AI & CS Community</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Roboto', sans-serif; }
        body { background: #0a0a0a; color: #fff; }
        header { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 50px 20px; background: linear-gradient(135deg, #4f46e5, #9333ea); text-align:center; }
        header img { max-width: 200px; margin-bottom: 20px; }
        header h1 { font-size: 3em; margin-bottom: 10px; }
        .credits { margin-bottom: 30px; font-size: 1.2em; line-height: 1.6; }
        .buttons { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .buttons a { padding: 15px 30px; background: #fff; color: #4f46e5; font-weight: bold; border-radius: 10px; text-decoration: none; transition: 0.3s; }
        .buttons a:hover { background: #4f46e5; color: #fff; }
        main { padding: 50px 20px; }
        .contributors-list { display: flex; flex-direction: column; gap: 15px; max-width: 600px; margin: auto; }
        .contributors-list a { padding: 15px 20px; background: #1f1f1f; color: #fff; border-radius: 8px; text-decoration: none; transition: 0.3s; }
        .contributors-list a:hover { background: #4f46e5; }
        .video-container { max-width: 800px; margin: 30px auto; display: flex; flex-direction: column; gap: 20px; }
        iframe { width: 100%; height: 450px; border: none; border-radius: 10px; }
        nav { background: #111; padding: 15px 20px; display: flex; gap: 20px; justify-content: center; }
        nav a { color: #fff; text-decoration: none; font-weight: bold; }
        nav a:hover { color: #4f46e5; }
    </style>
</head>
<body>

    <!-- Header / Landing Page -->
    <header>
        <img src="principa_logo.png" alt="Principa Logo">
        <h1>Principa</h1>
        <div class="credits">
            Founder: X<br>
            Co-founder: Z<br>
            Community Manager: Y
        </div>
        <div class="buttons">
            <a href="https://discord.gg/YOUR_DISCORD_LINK" target="_blank">Join Discord</a>
            <a href="contributors.html">Contributors</a>
        </div>
    </header>

    <!-- Contributors Page -->
    <main class="contributors-list">
        <h2 style="text-align:center; margin-bottom:30px;">Contributors</h2>
        <a href="contributor1.html">Contributor 1</a>
        <a href="contributor2.html">Contributor 2</a>
        <a href="contributor3.html">Contributor 3</a>
        <!-- Add more contributors as needed -->
    </main>

</body>
</html>
